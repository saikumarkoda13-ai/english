services:
  - type: web
    name: essay-scoring-app
    env: docker
    plan: free
    region: oregon 
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: essay-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: TF_NUM_INTEROP_THREADS
        value: "1"
      - key: TF_NUM_INTRAOP_THREADS
        value: "1"
