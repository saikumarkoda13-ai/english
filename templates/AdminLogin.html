{% extends 'base.html' %}
{% load static %}
{% block contents %}

<div class="container flex-grow-1 d-flex align-items-center justify-content-center animate__animated animate__fadeIn">
    <div class="row w-100 justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
            <div class="modern-card border-top border-4 border-danger">
                <div class="text-center mb-5">
                    <div class="d-inline-flex p-4 rounded-circle bg-danger bg-opacity-10 mb-4 animate__animated animate__pulse animate__infinite">
                        <i class="bi bi-shield-lock-fill fs-1 text-danger"></i>
                    </div>
                    <h2 class="h3 fw-bold mb-2">Admin Portal</h2>
                    <p class="text-muted">Secure system authentication required</p>
                </div>

                <form action="{% url 'AdminLoginCheck' %}" method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold small text-uppercase tracking-wider">Admin ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 px-3">
                                <i class="bi bi-person-badge text-muted"></i>
                            </span>
                            <input type="text" class="form-control bg-light border-start-0 ps-0 py-3" name="loginid" required placeholder="admin_username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold small text-uppercase tracking-wider">Secure Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 px-3">
                                <i class="bi bi-key-fill text-muted"></i>
                            </span>
                            <input type="password" class="form-control bg-light border-start-0 ps-0 py-3" name="pswd" required placeholder="••••••••">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button class="btn btn-danger d-flex justify-content-center align-items-center gap-2 py-3 fw-bold" 
                                type="submit" 
                                style="border-radius: 12px; box-shadow: 0 4px 15px rgba(220, 53, 69, 0.25);">
                            <span>Authorize Access</span>
                            <i class="bi bi-shield-check"></i>
                        </button>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger d-flex align-items-center gap-2 py-3 px-4 small border-0 rounded-4 animate__animated animate__shakeX">
                                <i class="bi bi-exclamation-triangle-fill"></i>
                                <span>{{ message }}</span>
                            </div>
                        {% endfor %}
                    {% endif %}
                </form>
            </div>
            
            <div class="text-center mt-5">
                <a href="{% url 'index' %}" class="text-muted small text-decoration-none hover-dark d-inline-flex align-items-center gap-2">
                    <i class="bi bi-house"></i>
                    <span>Return to Homepage</span>
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .tracking-wider { letter-spacing: 0.05em; }
    .hover-dark:hover { color: var(--dark-color) !important; }
    .input-group-text { border-color: transparent; }
    .form-control:focus { 
        background-color: #fff !important;
        border-color: #dc3545 !important;
        box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.1) !important;
    }
</style>

{% endblock %}
