{% extends 'base.html' %}
{% load static %}
{% block contents %}

<div class="container animate__animated animate__fadeIn">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8">
            <div class="modern-card">
                <div class="text-center mb-4">
                    <div class="d-inline-block p-3 rounded-circle bg-danger bg-opacity-10 mb-3">
                        <i class="bi bi-shield-lock-fill fs-1 text-danger"></i>
                    </div>
                    <h2 class="h3 fw-bold mb-1">Admin Portal</h2>
                    <p class="text-muted">Secure access for administrative staff</p>
                </div>

                <form action="{% url 'AdminLoginCheck' %}" method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Admin ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0">
                                <i class="bi bi-person-badge"></i>
                            </span>
                            <input type="text" class="form-control border-start-0 ps-0 p-3" name="loginid" required placeholder="admin">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Secure Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input type="password" class="form-control border-start-0 ps-0 p-3" name="pswd" required placeholder="••••••••">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button class="btn btn-danger d-flex justify-content-center align-items-center gap-2" 
                                type="submit" 
                                style="background-color: #dc3545; border:none; padding: 12px; font-weight:700;">
                            <span>Authorize Access</span>
                            <i class="bi bi-shield-check"></i>
                        </button>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger d-flex align-items-center gap-2 py-2 px-3 small border-0 rounded-3">
                                <i class="bi bi-exclamation-triangle-fill"></i>
                                <span>{{ message }}</span>
                            </div>
                        {% endfor %}
                    {% endif %}
                </form>
            </div>
            
            <div class="text-center mt-4">
                <a href="{% url 'index' %}" class="text-muted small text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i> Back to Main Site
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
