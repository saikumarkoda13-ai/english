{% extends 'base.html' %}
{% load static %}
{% block contents %}

<div class="container animate__animated animate__fadeIn">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8">
            <div class="modern-card">
                <div class="text-center mb-4">
                    <div class="d-inline-block p-3 rounded-circle bg-primary bg-opacity-10 mb-3">
                        <i class="bi bi-person-fill fs-1 text-primary"></i>
                    </div>
                    <h2 class="h3 fw-bold mb-1">User Login</h2>
                    <p class="text-muted">Enter your credentials to access your dashboard</p>
                </div>

                <form action="{% url 'UserLoginCheck' %}" method="POST" class="needs-validation">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Login ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control border-start-0 ps-0 p-3" name="loginid" required placeholder="example_id">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control border-start-0 ps-0 p-3" name="pswd" required placeholder="••••••••">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button class="btn btn-primary d-flex justify-content-center align-items-center gap-2" type="submit">
                            <span>Sign In</span>
                            <i class="bi bi-arrow-right"></i>
                        </button>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger d-flex align-items-center gap-2 py-2 px-3 small border-0 rounded-3">
                                <i class="bi bi-exclamation-circle-fill"></i>
                                <span>{{ message }}</span>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <div class="text-center mt-4">
                        <p class="text-muted small">Don't have an account? <a href="{% url 'UserRegister' %}" class="text-primary fw-bold text-decoration-none">Register here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
