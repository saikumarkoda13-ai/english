{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Admin Panel | AES</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 280px;
            --admin-primary: #dc3545;
            --admin-dark: #212529;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--admin-dark);
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 30px 24px;
            background: rgba(0,0,0,0.2);
        }

        .sidebar-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-menu {
            padding: 20px 12px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-weight: 500;
            border-radius: 8px;
            margin-bottom: 6px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-link.active {
            background-color: var(--admin-primary);
            color: white;
        }

        .nav-link i {
            font-size: 1.2rem;
        }

        .sidebar-footer {
            padding: 20px;
            background: rgba(0,0,0,0.2);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-navbar {
            height: 70px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .content-area {
            padding: 40px;
            flex: 1;
        }

        .modern-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 24px;
            border: none;
        }

        .badge-status {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-waiting { background: #fff3cd; color: #856404; }
        .status-activated { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="{% url 'AdminHome' %}" class="sidebar-brand">
                <i class="bi bi-shield-lock-fill text-danger"></i>
                <span>AES Admin</span>
            </a>
        </div>
        
        <div class="nav-menu">
            <a href="{% url 'AdminHome' %}" class="nav-link {% if request.resolver_match.url_name == 'AdminHome' %}active{% endif %}">
                <i class="bi bi-speedometer2"></i>
                <span>Summary</span>
            </a>
            <a href="{% url 'RegisterUsersView' %}" class="nav-link {% if request.resolver_match.url_name == 'RegisterUsersView' %}active{% endif %}">
                <i class="bi bi-people"></i>
                <span>Manage Users</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <a href="{% url 'index' %}" class="nav-link text-danger">
                <i class="bi bi-power"></i>
                <span>System Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <nav class="top-navbar">
            <div class="d-flex align-items-center gap-3">
                <i class="bi bi-list fs-4 text-muted"></i>
                <span class="text-muted fw-medium">Administrative Control Center</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end">
                    <div class="fw-bold">Administrator</div>
                    <div class="text-muted small">Root Access</div>
                </div>
                <div class="rounded-pill bg-danger bg-opacity-10 text-danger px-3 py-1 border border-danger border-opacity-25" style="font-weight: 600; font-size: 0.8rem;">
                    ONLINE
                </div>
            </div>
        </nav>

        <div class="content-area">
            {% block contents %}
            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
