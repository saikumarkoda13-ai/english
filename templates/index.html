{% extends 'base.html' %}
{% block contents %}
<div class="container d-flex flex-column align-items-center justify-content-center min-vh-100 py-5 animate__animated animate__fadeIn">
    <!-- App Logo Section -->
    <div class="app-logo-container mb-5 text-center">
        <div class="app-logo-bg animate__animated animate__zoomIn">
            <i class="bi bi-journal-check text-white display-1 p-4"></i>
        </div>
        <h1 class="app-title mt-4 mb-2">Essay Scoring</h1>
        <p class="app-tagline text-muted fw-medium">Smart AI Evaluation System</p>
    </div>

    <!-- Action Buttons -->
    <div class="w-100 max-w-400 d-flex flex-column gap-3 mt-2">
        <a href="{% url 'UserLogin' %}" class="app-btn btn-primary animate__animated animate__fadeInUp" style="animation-delay: 0.1s;">
            <i class="bi bi-person-fill"></i> User Login
        </a>
        <a href="{% url 'UserRegister' %}" class="app-btn btn-outline animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
            <i class="bi bi-person-plus-fill"></i> Register Now
        </a>
        <a href="{% url 'AdminLogin' %}" class="app-btn btn-dark animate__animated animate__fadeInUp" style="animation-delay: 0.3s;">
            <i class="bi bi-shield-lock-fill"></i> Admin Portal
        </a>
    </div>

    <!-- Footer Credit -->
    <div class="mt-auto pt-5">
        <p class="small text-muted opacity-50 fw-medium">Powered by LSTM Neural Networks</p>
    </div>
</div>

<style>
    .max-w-400 {
        max-width: 400px;
    }
    .app-logo-container {
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .app-logo-bg {
        width: 140px;
        height: 140px;
        background: var(--primary-gradient);
        border-radius: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 40px rgba(8, 102, 255, 0.3);
        transform: rotate(-5deg);
    }
    .app-title {
        font-size: 2.5rem;
        font-weight: 800;
        color: #1C1E21;
        letter-spacing: -1px;
    }
    .app-tagline {
        font-size: 1.1rem;
        letter-spacing: 0.5px;
    }
    .app-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 16px 20px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 1.1rem;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 2px solid transparent;
        box-shadow: var(--shadow-md);
    }
    .app-btn:active {
        transform: scale(0.96);
    }
    .btn-primary {
        background: var(--primary-gradient);
        color: white;
    }
    .btn-outline {
        background: rgba(255, 255, 255, 0.7);
        border-color: #0866FF;
        color: #0866FF;
        backdrop-filter: blur(10px);
    }
    .btn-dark {
        background: #1C1E21;
        color: white;
    }

    @media (max-width: 768px) {
        .app-title {
            font-size: 2.2rem;
        }
        .app-logo-bg {
            width: 120px;
            height: 120px;
        }
        .app-btn {
            padding: 14px 18px;
            font-size: 1rem;
        }
    }
</style>
{% endblock %}
