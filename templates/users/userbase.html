{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>User Dashboard | AES</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 280px;
            --primary-color: #0866FF;
            --bg-color: #F0F2F5;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.06);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: white;
            position: fixed;
            border-right: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            z-index: 1050;
            transition: var(--transition);
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
        }

        .sidebar-header {
            padding: 30px 24px;
            border-bottom: 1px solid #f8f9fa;
        }

        .sidebar-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            letter-spacing: -0.5px;
        }

        .nav-menu {
            padding: 25px 15px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            color: #4B4D50;
            text-decoration: none;
            font-weight: 600;
            border-radius: 12px;
            margin-bottom: 6px;
            transition: var(--transition);
        }

        .nav-link:hover {
            background-color: #F8F9FA;
            color: var(--primary-color);
            transform: translateX(5px);
        }

        .nav-link.active {
            background-color: #E7F3FF;
            color: var(--primary-color);
            box-shadow: 0 4px 12px rgba(8, 102, 255, 0.08);
        }

        .nav-link i {
            font-size: 1.3rem;
        }

        .sidebar-footer {
            padding: 24px;
            border-top: 1px solid #f8f9fa;
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .top-navbar {
            height: 80px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            padding: 0 35px;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .content-area {
            padding: 35px;
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* Mobile Adjustments */
        @media (max-width: 1024px) {
            .sidebar {
                left: calc(-1 * var(--sidebar-width));
            }
            .sidebar.show {
                left: 0;
            }
            .main-content {
                margin-left: 0;
            }
            .content-area {
                padding: 25px 15px;
            }
            .top-navbar {
                padding: 0 20px;
            }
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1040;
            display: none;
            backdrop-filter: blur(3px);
        }

        .sidebar-overlay.show {
            display: block;
        }

        .dashboard-header {
            margin-bottom: 35px;
        }

        .welcome-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: #1C1E21;
        }

        .modern-card {
            background: white;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.03);
            transition: var(--transition);
        }

        .btn-action {
            background: linear-gradient(135deg, var(--primary-color) 0%, #00C6FF 100%);
            color: white;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 700;
            border: none;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(8, 102, 255, 0.2);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(8, 102, 255, 0.3);
            filter: brightness(1.1);
        }
    </style>
</head>
<body id="body-pd">

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="{% url 'UserHome' %}" class="sidebar-brand">
                <i class="bi bi-pencil-square"></i>
                <span>AES Score</span>
            </a>
        </div>
        
        <div class="nav-menu">
            <a href="{% url 'UserHome' %}" class="nav-link {% if 'UserHome' in request.path %}active{% endif %}">
                <i class="bi bi-house-door"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'prediction' %}" class="nav-link {% if 'prediction' in request.path %}active{% endif %}">
                <i class="bi bi-magic"></i>
                <span>Analyze Essay</span>
            </a>
            <a href="{% url 'DatasetView' %}" class="nav-link {% if 'DatasetView' in request.path %}active{% endif %}">
                <i class="bi bi-database"></i>
                <span>Training Data</span>
            </a>
            <a href="{% url 'training' %}" class="nav-link {% if 'training' in request.path %}active{% endif %}">
                <i class="bi bi-cpu"></i>
                <span>Model Stats</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <a href="{% url 'index' %}" class="nav-link text-danger logout-link">
                <i class="bi bi-box-arrow-left"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <nav class="top-navbar">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-light rounded-circle shadow-sm d-lg-none" id="sidebar-toggle">
                    <i class="bi bi-list fs-4"></i>
                </button>
                <div class="d-none d-sm-block">
                    <span class="text-muted fw-bold small text-uppercase tracking-wider">User Panel</span>
                </div>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-md-block">
                    <div class="fw-bold text-dark">{{ request.session.loggeduser }}</div>
                    <div class="text-muted small">Student Account</div>
                </div>
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center shadow-sm" style="width: 48px; height: 48px; font-weight: 800; font-family: 'Outfit', sans-serif; font-size: 1.2rem;">
                    {{ request.session.loggeduser|slice:":1"|upper }}
                </div>
            </div>
        </nav>

        <div class="content-area animate__animated animate__fadeIn">
            {% block contents %}
            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('sidebar-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if(toggle) {
                toggle.addEventListener('click', () => {
                    sidebar.classList.toggle('show');
                    overlay.classList.toggle('show');
                });
            }

            if(overlay) {
                overlay.addEventListener('click', () => {
                    sidebar.classList.remove('show');
                    overlay.classList.remove('show');
                });
            }
        });
    </script>
    {% block scripts %}
    {% endblock %}
</body>
</html>
